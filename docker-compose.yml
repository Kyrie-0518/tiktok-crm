version: "3.8"

services:
  # ── 后端 API 服务 ──
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bozone-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库和上传文件
      - ./server/data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=data/erp.db
      - UPLOAD_DIR=/app/data/uploads
      - NODE_ENV=production
      # TikTok OAuth（部署时填写）
      - TIKTOK_APP_KEY=
      - TIKTOK_APP_SECRET=
      - TIKTOK_REDIRECT_URI=
      - FRONTEND_URL=http://localhost
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    networks:
      - bozone-net

  # ── 前端 Nginx 服务 ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bozone-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    networks:
      - bozone-net

networks:
  bozone-net:
    driver: bridge
