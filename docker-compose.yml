version: "3.8"

services:
  # ── 后端 API 服务 ──
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bozone-server
    restart: unless-stopped
    # 网络模式：与宿主机共享网络栈，可直接访问宿主机 127.0.0.1:7890 代理
    network_mode: host
    volumes:
      # 持久化数据库和上传文件
      - ./server/data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=data/erp.db
      - UPLOAD_DIR=/app/data/uploads
      - NODE_ENV=production
      # TikTok OAuth
      - TIKTOK_APP_KEY=6k44pdou0umit
      - TIKTOK_APP_SECRET=0f17b939f9f7074ffbb396510110cb07effd1cf5
      - TIKTOK_SERVICE_ID=7644440536870733576
      - TIKTOK_REDIRECT_URI=https://bvefdvp.cn/api/shops/tiktok/callback
      - FRONTEND_URL=https://bvefdvp.cn
      - TIKTOK_ENV=production
      - TIKTOK_API_BASE=https://open-api.tiktokglobalshop.com
      # TikTok Ads OAuth
      - TT_ADS_APP_ID=7641162218708434960
      - TT_ADS_APP_SECRET=9c1115593f6199a22eecb3777b7890cbdb8c5445
      - TT_ADS_REDIRECT_URI=https://bvefdvp.cn/api/tiktok-ads/callback
      # 代理商商务中心 ID（资金由代理商管理）
      - TT_ADS_AGENT_BC_ID=7595409691837120513
      # 企业微信 Bot（暂未配置，接入时填写）
      - WECOM_CORP_ID=
      - WECOM_AGENT_ID=
      - WECOM_SECRET=
      - WECOM_TOKEN=
      - WECOM_ENCODING_AES_KEY=
      # 飞书 Bot（暂未配置，接入时填写）
      - FEISHU_APP_ID=
      - FEISHU_APP_SECRET=
      - FEISHU_VERIFICATION_TOKEN=
      - FEISHU_ENCRYPT_KEY=
      # 代理配置：host 网络模式下直接用 127.0.0.1
      - HTTPS_PROXY=http://127.0.0.1:7890
      - HTTP_PROXY=http://127.0.0.1:7890
      # Cloudflare Worker 中继（国内 ECS 直连 TikTok 不通时自动走这个）
      - TT_ADS_RELAY_URL=https://kyrie.yangyue0505.workers.dev
      - TT_ADS_RELAY_TOKEN=kyrie-tiktok-relay-2026-a8f3d9c7
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    # DNS 备用，确保容器能解析 TikTok API 域名
    dns:
      - 8.8.8.8
      - 114.114.114.114

  # ── 前端 Nginx 服务 ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bozone-client
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    networks:
      - bozone-net

networks:
  bozone-net:
    driver: bridge
