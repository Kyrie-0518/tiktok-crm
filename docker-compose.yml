version: "3.8"

services:
  # ── 后端 API 服务 ──
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bozone-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库和上传文件
      - ./server/data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=data/erp.db
      - UPLOAD_DIR=/app/data/uploads
      - NODE_ENV=production
      # TikTok OAuth
      - TIKTOK_APP_KEY=6k44pdou0umit
      - TIKTOK_APP_SECRET=0f17b939f9f7074ffbb396510110cb07effd1cf5
      - TIKTOK_SERVICE_ID=7644440536870733576
      - TIKTOK_REDIRECT_URI=http://8.163.24.221/api/shops/tiktok/callback
      - FRONTEND_URL=http://8.163.24.221
      - TIKTOK_ENV=sandbox
      - TIKTOK_API_BASE=https://open-api-sandbox.tiktokglobalshop.com
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    # DNS 备用，确保容器能解析 TikTok API 域名
    dns:
      - 8.8.8.8
      - 114.114.114.114
    networks:
      - bozone-net

  # ── 前端 Nginx 服务 ──
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bozone-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    networks:
      - bozone-net

networks:
  bozone-net:
    driver: bridge
